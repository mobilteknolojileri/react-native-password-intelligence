version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: npm
    directory: "/example"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(example)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Europe/Istanbul
    commit-message:
      prefix: "ci"
      include: scope
