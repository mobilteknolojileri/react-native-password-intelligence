version: 2
updates:
  # CI workflow supply chain — most security-critical surface
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "03:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: scope

  # Root npm — security patches and curated minor updates
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "03:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
