name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      - name: Use latest npm (required for trusted publisher oidc)
        run: npm install -g npm@latest

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Test with coverage
        run: yarn test --maxWorkers=2 --coverage

      - name: Build library
        run: yarn prepare

      - name: Pack tarball for release attachment
        run: npm pack

      - name: Generate sha256 checksum for the tarball
        run: |
          TARBALL=$(ls react-native-password-intelligence-*.tgz)
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          cat "${TARBALL}.sha256"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            CHANGELOG.md
            react-native-password-intelligence-*.tgz
            react-native-password-intelligence-*.tgz.sha256
